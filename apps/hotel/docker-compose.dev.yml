services:
  app:
    build:
      context: ../..
      dockerfile: apps/hotel/Dockerfile
      args:
        - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3002}
        - S3_ENDPOINT=${S3_ENDPOINT}
      target: runner
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3002}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NODE_ENV=production
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PREFIX=${S3_PREFIX}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_FORCE_PATH_STYLE=true
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_ADDRESS=${RESEND_FROM_ADDRESS}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hotel-network-dev

  mongodb:
    image: mongo:6
    ports:
      - "27019:27017"
    volumes:
      - hotel-mongodb-data-dev:/data/db
    networks:
      - hotel-network-dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - hotel-minio-data-dev:/data
    command: server --console-address ":9001" /data
    networks:
      - hotel-network-dev
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET=${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "/usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} && /usr/bin/mc mb myminio/$${S3_BUCKET} --ignore-existing && /usr/bin/mc anonymous set public myminio/$${S3_BUCKET} && exit 0"
    networks:
      - hotel-network-dev

volumes:
  hotel-mongodb-data-dev:
  hotel-minio-data-dev:

networks:
  hotel-network-dev:
    driver: bridge
