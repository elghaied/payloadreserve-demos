version: 36
jobs:

# ── CI: push to main → build & push to OneDev built-in registry ──────────────
- name: Build Salon Image
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !BuildImageStep
    name: Build & push to registry
    buildPath: .
    dockerfile: apps/salon/Dockerfile
    output: !RegistryOutput
      tags: onedev.payloadreserve.com/payloadreserve-demos/salon:@build_number@ onedev.payloadreserve.com/payloadreserve-demos/salon:latest
    registryLogins:
    - registryUrl: onedev.payloadreserve.com
      userName: '@job_token@'
      passwordSecret: ONEDEV_PASSWORD
    moreOptions: --build-arg NEXT_PUBLIC_SERVER_URL=@secret:NEXT_PUBLIC_SERVER_URL@ --build-arg S3_ENDPOINT=@secret:S3_ENDPOINT@
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  triggers:
  - !BranchUpdateTrigger
    branches: main
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600

# ── CI: push to main → build & push landing image ────────────────────────────
- name: Build Landing Image
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !BuildImageStep
    name: Build & push to registry
    buildPath: .
    dockerfile: apps/landing/Dockerfile
    output: !RegistryOutput
      tags: onedev.payloadreserve.com/payloadreserve-demos/landing:@build_number@ onedev.payloadreserve.com/payloadreserve-demos/landing:latest
    registryLogins:
    - registryUrl: onedev.payloadreserve.com
      userName: '@job_token@'
      passwordSecret: ONEDEV_PASSWORD
    moreOptions: --build-arg NEXT_PUBLIC_SERVER_URL=@secret:LANDING_NEXT_PUBLIC_SERVER_URL@ --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=@secret:NEXT_PUBLIC_TURNSTILE_SITE_KEY@
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  triggers:
  - !BranchUpdateTrigger
    branches: main
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600

# ── Release: git tag → versioned image in OneDev registry ────────────────────
- name: Release Salon Image
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !BuildImageStep
    name: Build & push versioned image
    buildPath: .
    dockerfile: apps/salon/Dockerfile
    output: !RegistryOutput
      tags: onedev.payloadreserve.com/payloadreserve-demos/salon:@tag@ onedev.payloadreserve.com/payloadreserve-demos/salon:latest
    registryLogins:
    - registryUrl: onedev.payloadreserve.com
      userName: '@job_token@'
      passwordSecret: ONEDEV_PASSWORD
    moreOptions: --build-arg NEXT_PUBLIC_SERVER_URL=@secret:NEXT_PUBLIC_SERVER_URL@ --build-arg S3_ENDPOINT=@secret:S3_ENDPOINT@
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  triggers:
  - !TagCreateTrigger {}
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600

# ── Release: git tag → versioned landing image ───────────────────────────────
- name: Release Landing Image
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !BuildImageStep
    name: Build & push versioned image
    buildPath: .
    dockerfile: apps/landing/Dockerfile
    output: !RegistryOutput
      tags: onedev.payloadreserve.com/payloadreserve-demos/landing:@tag@ onedev.payloadreserve.com/payloadreserve-demos/landing:latest
    registryLogins:
    - registryUrl: onedev.payloadreserve.com
      userName: '@job_token@'
      passwordSecret: ONEDEV_PASSWORD
    moreOptions: --build-arg NEXT_PUBLIC_SERVER_URL=@secret:LANDING_NEXT_PUBLIC_SERVER_URL@ --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=@secret:NEXT_PUBLIC_TURNSTILE_SITE_KEY@
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  triggers:
  - !TagCreateTrigger {}
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600
