name: CI
on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint / Type-check / Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mongodb://localhost:27017/ci-dummy
      PAYLOAD_SECRET: ci-dummy-secret-at-least-32-chars-long
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - name: Type-check all apps
        run: |
          pnpm --filter=landing typecheck
          pnpm --filter=docs typecheck
          pnpm --filter=salon exec tsc --noEmit
          pnpm --filter=restaurant exec tsc --noEmit
          pnpm --filter=events exec tsc --noEmit
          pnpm --filter=hotel exec tsc --noEmit

      - name: Build all apps
        run: pnpm build --concurrency=2
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: dummy
          S3_ENDPOINT: dummy
