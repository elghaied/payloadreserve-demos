name: Docker Build & Push
on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options: [salon, landing, docs, restaurant, events, hotel]
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: latest

jobs:
  build:
    name: Build ${{ inputs.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required for GHCR push

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Resolve app-specific config
        id: config
        run: |
          case "${{ inputs.app }}" in
            salon)
              echo "server_url=${{ vars.SALON_NEXT_PUBLIC_SERVER_URL }}" >> $GITHUB_OUTPUT ;;
            landing)
              echo "server_url=${{ vars.LANDING_NEXT_PUBLIC_SERVER_URL }}" >> $GITHUB_OUTPUT ;;
            docs)
              echo "server_url=${{ vars.DOCS_NEXT_PUBLIC_SERVER_URL }}" >> $GITHUB_OUTPUT ;;
            restaurant)
              echo "server_url=${{ vars.RESTAURANT_NEXT_PUBLIC_SERVER_URL }}" >> $GITHUB_OUTPUT ;;
            events)
              echo "server_url=${{ vars.EVENTS_NEXT_PUBLIC_SERVER_URL }}" >> $GITHUB_OUTPUT ;;
            hotel)
              echo "server_url=${{ vars.HOTEL_NEXT_PUBLIC_SERVER_URL }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: apps/${{ inputs.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SERVER_URL=${{ steps.config.outputs.server_url }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
